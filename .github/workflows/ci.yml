name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: bash scripts/validate-adapter.sh

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true


