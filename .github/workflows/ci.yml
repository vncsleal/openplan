name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openplan-mcp

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: openplan-mcp/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: bash scripts/validate-adapter.sh

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openplan-mcp

    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  api-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: openplan-api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: openplan-api/services/telemetry/requirements.txt
      - run: pip install -r services/telemetry/requirements.txt pytest httpx
      - run: pytest -v
